<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>js</title>
    </head>
    <body>
        <h5>九九乘法表</h5>
        <script>
            for(var a=1; a<=9; a++){
                for(var b=1; b<=a; b++){ 
                    document.write(a + "*" + b + "=" + (a*b) + "\t");
                }
                document.write("<br>"); 
            }
        </script>
    </body>
</html>
