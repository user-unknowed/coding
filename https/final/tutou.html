            <div class="steps">
                <p class="h2">制作步骤</p>
                <ul>
                    <li>预处理：新鲜兔头洗净，冷水下锅加料酒、姜片煮沸，捞出洗净血沫。</li>
                    <li>炖煮：锅中放油，加冰糖炒糖色，下兔头翻炒上色。加八角、花椒、干辣椒、葱段、姜片、生抽、老抽、料酒，加热水没过兔头，大火烧开转小火炖40分钟。</li>
                    <li>收汁：开大火收浓汤汁，撒少许盐调味即可。</li>
                </ul>
            </div>
