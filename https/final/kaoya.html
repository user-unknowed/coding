            <div class="steps">
                <p class="h2">制作步骤</p>
                <ul>
                    <li>1.腌制风干：鸭子洗净，用沸水浇淋表皮至紧绷。混合蜂蜜、料酒、白醋（比例2:1:1）刷匀鸭身，通风处晾8小时至干透。</li>
                    <li>2.烤制：鸭子腹中塞苹果块，用牙签封口。烤箱预热180℃，先烤40分钟，翻面再烤30分钟，最后调至200℃烤10分钟使皮酥脆。</li>
                    <li>3.切块：将烤好的鸭子切成块，用刀切成1cm厚的块。</li>
                    <li>4.配薄饼、甜面酱、葱丝、黄瓜丝食用。</li>
                </ul>
            </div>
