		<link href="css/main.css" type="text/css" rel="stylesheet">
		<link href="css/register.css" type="text/css" rel="stylesheet">
	</head>

	<body>
		<!-- 头部 -->
		<header>
			<div class="container">
				<div class="header-content">
					<a href="index.html" class="logo">中华美食</a>
					<nav>
						<ul class="main-nav">
							<li><a href="index.html">首页</a></li>
							<li><a href="cuisine-sichuan.html">川菜</a></li>
							<li><a href="cuisine-guangdong.html">粤菜</a></li>
							<li><a href="cuisine-shandong.html">鲁菜</a></li>
							<li><a href="cuisine-jiangsu.html">苏菜</a></li>
							<li><a href="login.html">登录</a></li>
							<li><a href="register.html">注册</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<!-- 登录表单 -->
		<main>
			<div class="container">
				<div class="register-form-container">
					<h2>用户登录</h2>
					<form name="loginForm" method="post" action="login.php" autocomplete="on" onsubmit="return validateLoginForm()">
						<fieldset>
							<legend>登录信息</legend>
							<div class="form-group">
								<label for="loginUsername">用户名</label>
								<input type="text" id="loginUsername" name="username" placeholder="请输入用户名" title="请输入用户名" required>
								<div class="form-error" id="loginUsernameError"></div>
							</div>
							<div class="form-group">
								<label for="loginPassword">密码</label>
								<input type="password" id="loginPassword" name="password" placeholder="请输入密码" title="请输入密码" required>
								<div class="form-error" id="loginPasswordError"></div>
							</div>
							<div class="form-actions">
								<button type="submit" name="submit" class="btn btn-primary">登录</button>
								<button type="reset" name="reset" class="btn btn-secondary">重置</button>
							</div>
						</fieldset>
					</form>
					<p class="login-link">还没有账号？<a href="register.html">立即注册</a></p>
				</div>
			</div>
		</main>

		<!-- 底部 -->
		<footer>
			<div class="container">
				<div class="footer-content">
					<div class="footer-section">
						<h3>联系方式</h3>
						<div class="contact-info">
							<p>电话：123-4567-8910</p>
							<p>邮箱：info@chinesefood.com</p>
							<p>地址：北京市朝阳区美食街123号</p>
						</div>
					</div>
					<div class="footer-section">
						<h3>快速链接</h3>
						<ul>
							<li><a href="index.html">首页</a></li>
							<li><a href="cuisine-sichuan.html">川菜</a></li>
							<li><a href="cuisine-guangdong.html">粤菜</a></li>
							<li><a href="cuisine-shandong.html">鲁菜</a></li>
							<li><a href="cuisine-jiangsu.html">苏菜</a></li>
						</ul>
					</div>
					<div class="footer-section">
						<h3>法律信息</h3>
						<ul>
							<li><a href="#">隐私政策</a></li>
							<li><a href="#">使用条款</a></li>

						</ul>

					<p>&copy; 2025 中华美食 版权所有</p>
				</div>
			</div>
		</footer>

		<!-- 表单验证脚本 -->
		<script>
			function validateLoginForm() {
				let isValid = true;
				
				// 重置错误信息
				document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
				
				// 验证用户名
				const username = document.getElementById('loginUsername').value;
				if (username.trim() === '') {
					document.getElementById('loginUsernameError').textContent = '请输入用户名';
					isValid = false;
				}
				
				// 验证密码
				const password = document.getElementById('loginPassword').value;
				if (password.trim() === '') {
					document.getElementById('loginPasswordError').textContent = '请输入密码';
					isValid = false;
				}
				
				if (isValid) {
					alert('登录成功！');
				}
				
				return isValid;
			}
		</script>
	</body>
</html>
