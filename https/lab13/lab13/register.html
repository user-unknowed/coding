<html>
	<head>
		<meta charset="utf-8">
		<title>中华美食 - 用户注册</title>
		<link href="css/main.css" type="text/css" rel="stylesheet">
		<link href="css/register.css" type="text/css" rel="stylesheet">
	</head>

	<body>
		<!-- 头部 -->
		<header>
			<div class="container">
				<div class="header-content">
					<a href="index.html" class="logo">中华美食</a>
					<nav>
						<ul class="main-nav">
							<li><a href="index.html">首页</a></li>
							<li><a href="cuisine-sichuan.html">川菜</a></li>
							<li><a href="cuisine-guangdong.html">粤菜</a></li>
							<li><a href="cuisine-shandong.html">鲁菜</a></li>
							<li><a href="cuisine-jiangsu.html">苏菜</a></li>
							<li><a href="login.html">登录</a></li>
							<li><a href="register.html">注册</a></li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<!-- 注册表单 -->
		<main>
			<div class="container">
				<div class="register-form-container">
					<h2>用户注册</h2>
					<form name="registerForm" method="post" action="login.php" autocomplete="on" onsubmit="return validateForm()">
						<fieldset>
							<legend>用户信息</legend>
							<div class="form-group">
								<label for="username">用户名</label>
								<input type="text" id="username" name="username" placeholder="请输入用户名" title="请输入用户名" required>
								<div class="form-error" id="usernameError"></div>
							</div>
							<div class="form-group">
								<label for="password">密码</label>
								<input type="password" id="password" name="password" placeholder="请输入6-12位密码" title="请输入6-12位密码" pattern=".{6,12}" required>
								<div class="form-error" id="passwordError"></div>
							</div>
							<div class="form-group">
								<label for="confirmPassword">确认密码</label>
								<input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" title="请再次输入密码" required>
								<div class="form-error" id="confirmPasswordError"></div>
							</div>
							<div class="form-group">
								<label for="email">邮箱</label>
								<input type="email" id="email" name="email" placeholder="xxx@xxx.com" title="请输入邮箱" pattern="\w+@\w+\.\w+" required>
								<div class="form-error" id="emailError"></div>
							</div>
							<div class="form-group">
								<label>性别</label>
								<div class="radio-group">
									<input type="radio" id="male" name="sex" value="male" checked>
									<label for="male">男</label>
									<input type="radio" id="female" name="sex" value="female">
									<label for="female">女</label>
									<input type="radio" id="other" name="sex" value="other">
									<label for="other">未知</label>
								</div>
							</div>
							<div class="form-actions">
								<button type="submit" name="submit" class="btn btn-primary">注册</button>
								<button type="reset" name="reset" class="btn btn-secondary">重置</button>
							</div>
						</fieldset>
					</form>
					<p class="login-link">已有账号？<a href="login.html">立即登录</a></p>
				</div>
			</div>
		</main>

		<!-- 底部 -->
		<footer>
			<div class="container">
				<div class="footer-content">
					<div class="footer-section">
						<h3>联系方式</h3>
						<div class="contact-info">
							<p>电话：123-4567-8910</p>
							<p>邮箱：info@chinesefood.com</p>
							<p>地址：北京市朝阳区美食街123号</p>
						</div>
					</div>
					<div class="footer-section">
						<h3>快速链接</h3>
						<ul>
							<li><a href="index.html">首页</a></li>
							<li><a href="cuisine-sichuan.html">川菜</a></li>
							<li><a href="cuisine-guangdong.html">粤菜</a></li>
							<li><a href="cuisine-shandong.html">鲁菜</a></li>
							<li><a href="cuisine-jiangsu.html">苏菜</a></li>
						</ul>
					</div>
					<div class="footer-section">
						<h3>法律信息</h3>
						<ul>
							<li><a href="#">隐私政策</a></li>
							<li><a href="#">使用条款</a></li>

						</ul>
					</div>
				</div>

					<p>&copy; 2025 中华美食 版权所有</p>
				</div>
			</div>
		</footer>

		<!-- 表单验证脚本 -->
		<script>
			function validateForm() {
				let isValid = true;
				
				// 重置错误信息
				document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
				
				// 验证用户名
				const username = document.getElementById('username').value;
				if (username.length < 3 || username.length > 20) {
					document.getElementById('usernameError').textContent = '用户名长度必须在3-20个字符之间';
					isValid = false;
				}
				
				// 验证密码
				const password = document.getElementById('password').value;
				if (password.length < 6 || password.length > 12) {
					document.getElementById('passwordError').textContent = '密码长度必须在6-12个字符之间';
					isValid = false;
				}
				
				// 验证确认密码
				const confirmPassword = document.getElementById('confirmPassword').value;
				if (password !== confirmPassword) {
					document.getElementById('confirmPasswordError').textContent = '两次输入的密码不一致';
					isValid = false;
				}
				
				// 验证邮箱
				const email = document.getElementById('email').value;
				const emailRegex = /^\w+@\w+\.\w+$/;
				if (!emailRegex.test(email)) {
					document.getElementById('emailError').textContent = '请输入有效的邮箱地址';
					isValid = false;
				}
				
				if (isValid) {
					alert('注册成功！');
				}
				
				return isValid;
			}
		</script>
	</body>
</html>
