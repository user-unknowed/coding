<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>optgroup</title>
</head>
<body>
    <form action="" method="post">
        <p>请选择所在区域：</p>
        <select>
            <option>--请选择--</option>
            <optgroup label="北京">
                <option>东城区</option>
                <option>西城区</option>
                <option>朝阳区</option>
                <option>海淀区</option>
            </optgroup>
            <optgroup label="天津">
                <option>和平区</option>
                <option>河东区</option>
                <option>河西区</option>
            </optgroup>
        </select>
    </form>
    
    
</body>
</html>
</html>
