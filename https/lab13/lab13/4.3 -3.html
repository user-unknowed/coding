<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fieldset&legend</title>
</head>
<body>
    <form action="" method="post">
        <fieldset id="st">
        <legend>学生信息</legend>
        <p>姓名：<input type="text" name="stuName" /></p>
        <p>性别：<input type="radio" name="sex" value="male" />男
        <input type="radio" name="sex" value="female" />女</p>
        <p>年龄：<input type="number" name="stuAge" max="25" /></p>
        </fieldset>
        <!-- name属性是表单数据提交时的键名
        如果多个字段name相同，提交时会覆盖或丢失数据
        使用有意义的、唯一的name -->
        <fieldset id=“father">
            <legend>父亲信息</legend>
            <p>姓名：<input type="text" name="fatherName" /></p>
            <p>年龄：<input type="text" name="fatherAge" /></p>
            <p>职业：<input type="text" name="fatherOccupation" /></p>
        </fieldset>
        <fieldset id=“mother">
            <legend>母亲信息</legend>
            <p>姓名：<input type="text" name="motherName" /></p>
            <p>年龄：<input type="text" name="motherAge" /></p>
            <p>职业：<input type="text" name="motherOccupation" /></p>
        </fieldset>
        <input type="submit" value="提交"/>
        <input type="reset" value="重置"/>
    </form>  
    
</body>
</html>
</html>
