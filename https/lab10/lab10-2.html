<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			*{
				padding: 0; 
				margin: 0; 
				font-size: 14px;}
			ul{
				width: 75%;
				margin: 0 auto; 
				height: 30px;
				list-style-type: none;
				background-color:aquamarine;
				text-align: center
			}
			ul li{
				display: inline-block;
				width: 70px;
				height: 100%;
				text-align: center;
				line-height: 30px;				
			}
            nav a{
                font-family: "黑体";
                color:blue;
                text-decoration:none;  
            }
			nav a:hover{
				color: red;
				text-decoration:underline;}
			nav a:active{ 
				color:yellow;}

		</style>
	</head>
	<body>
		<nav>
			<ul>  
				<li><a href="#">首页</a></li>
				<li><a href="#">国内</a></li>
				<li><a href="#">国际</a></li>
				<li><a href="#">财经</a></li>
				<li><a href="#">娱乐</a></li>
				<li><a href="#">体育</a></li>
				<li><a href="#">互联网</a></li>
			</ul>
		</nav>
	</body>
</html>
