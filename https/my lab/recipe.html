  <body>
    <h1>番茄炒鸡蛋</h1>
    <p>家常菜式，没什么好说的，好吃</p>
    <h2>材料：</h2>
    <ul>
      <li>鸡蛋（反正就是蛋）两个</li>
      <li>番茄两个</li>
      <li>老姜几片</li>
    </ul>
    <h2>做法:</h2>
    <ol>
      <li>番茄剥皮</li>
      <li>鸡蛋打散</li>
      <li>老姜切片拍散</li>
      <li>老姜添油下锅</li>
      <li>炒鸡蛋和番茄</li>
    </ol>
    <h2>成品展示</h2>
    <img src='https://cdn.freecodecamp.org/curriculum/labs/recipe.jpg' alt='the result'>
  </body>
